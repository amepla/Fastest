name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          TAG="v${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "dmg=MacBrowser-${TAG}.dmg" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: pip install -r requirements.txt

      - name: Build DMG
        env:
          APP_VERSION: ${{ steps.meta.outputs.tag }}
        run: |
          ./scripts/create-dmg-background.sh
          ./scripts/create-dmg.sh "${{ steps.meta.outputs.tag }}"

      - name: Publish release with gh
        env:
          GH_TOKEN: ${{ github.token }}
          APP_VERSION: ${{ steps.meta.outputs.tag }}
        run: ./scripts/release.sh "${{ steps.meta.outputs.tag }}" --skip-build
